<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POS Billing System - Custom</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f6f9fc, #e9f7ef);
      font-family: 'Segoe UI', sans-serif;
    }

    h2 {
      font-weight: bold;
      color: #2c3e50;
    }

    .table {
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
    }

    thead {
      background: #2ecc71;
      color: white;
    }

    .table td, .table th {
      vertical-align: middle;
      text-align: center;
    }

    input {
      text-align: center;
      border-radius: 8px !important;
    }

    #grandTotal {
      color: #2980b9;
      font-weight: bold;
    }

    #offer {
      color: #e67e22;
      font-weight: bold;
    }

    #final-paymemt {
      color: #27ae60;
      font-size: 18px;
      font-weight: bold;
    }

    .receipt-section {
      background: #ffffff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>
  <div class="container mt-4">
    <h2 class="text-center mb-4">🍽️ Custom POS Billing</h2>

    <table class="table table-bordered">
      <thead>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
      </thead>
      <tbody>
        <tr>
          <td>Golgappa</td>
          <td>50</td>
          <td><input type="number" class="form-control" oninput="cal(this,50,`t1`)"></td>
          <td id="t1">0</td>
        </tr>
        <tr>
          <td>Ice Cream</td>
          <td>150</td>
          <td><input type="number" class="form-control" oninput="cal(this,150,`t2`)"></td>
          <td id="t2">0</td>
        </tr>
        <tr>
          <td>Trifle</td>
          <td>300</td>
          <td><input type="number" class="form-control" oninput="cal(this,300,`t3`)"></td>
          <td id="t3">0</td>
        </tr>
        <tr>
          <td>Momos</td>
          <td>200</td>
          <td><input type="number" class="form-control" oninput="cal(this,200,`t4`)"></td>
          <td id="t4">0</td>
        </tr>

        <tr>
          <th colspan="3">Grand Total</th>
          <th id="grandTotal">0</th>
        </tr>
        <tr>
          <th colspan="3">After 70% Discount</th>
          <th id="offer">0</th>
        </tr>
        <tr>
          <th colspan="3">Total Payment</th>
          <th id="final-payment">0</th>
        </tr>
      </tbody>
    </table>

    <hr class="my-4">

    <div class="receipt-section mt-4">
      <h3 class="text-center mb-3">Receipt</h3>
      <table class="table table-bordered table-sm">
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="receipt-lines"></tbody>
        <tfoot>
          <tr>
            <th colspan="2" class="text-end">Grand total</th>
            <th id="receipt-grand-total">0</th>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <script>
    function cal(input, price, totalId) {
      let qty = input.value;
      let total = qty * price;
      document.getElementById(totalId).innerHTML = Math.round(total);
      calculateGrandTotal();
      updateReceiptFromDom();
    }

    function calculateGrandTotal() {
      let t1 = parseInt(document.getElementById("t1").innerHTML);
      let t2 = parseInt(document.getElementById("t2").innerHTML);
      let t3 = parseInt(document.getElementById("t3").innerHTML);
      let t4 = parseInt(document.getElementById("t4").innerHTML);

      let grandTotal = t1 + t2 + t3 + t4;
      document.getElementById("grandTotal").innerHTML = grandTotal;

      let discount = Math.round(grandTotal * 0.70);
      document.getElementById("offer").innerHTML = discount;

      let final = Math.round(grandTotal - discount);
      document.getElementById("final-payment").innerHTML = final;
    }

    function updateReceiptFromDom() {
      var lineIds = ['t1', 't2', 't3', 't4'];
      var tbody = document.getElementById('receipt-lines');
      var outGrand = document.getElementById('receipt-grand-total');
      if (!tbody || !outGrand) return;

      var rowsHtml = '';
      for (var i = 0; i < lineIds.length; i++) {
        var totalCell = document.getElementById(lineIds[i]);
        if (!totalCell) continue;
        var tr = totalCell.closest('tr');
        if (!tr) continue;
        var nameTd = tr.querySelector('td');
        var qtyInput = tr.querySelector('input[type="number"]');
        var sub = parseInt(totalCell.textContent, 10) || 0;
        var qty = qtyInput ? (parseFloat(qtyInput.value) || 0) : 0;
        if (sub <= 0 && qty <= 0) continue;
        var name = nameTd ? nameTd.textContent.trim() : 'Item';

        rowsHtml += `<tr><td>${name}</td><td>${qty}</td><td>${sub}</td></tr>`;
      }
      tbody.innerHTML = rowsHtml;

      var gt = document.getElementById('grandTotal');
      outGrand.textContent = gt ? gt.textContent : '0';
    }
  </script>

</body>
</html>
